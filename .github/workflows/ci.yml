name: CI/CD Pipeline - Static Web

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------
      # 1. Checkout Repo
      # ----------------------
      - name: Checkout Code
        uses: actions/checkout@v3

      # ----------------------
      # 2. Build Docker Image
      # ----------------------
      - name: Build Docker Image
        run: docker build -t static-web .

      # ----------------------
      # 3. Login ke GitHub Container Registry
      # ----------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 


      # Tag docker image
      - name: Tag Docker Image
        run: docker tag static-web ghcr.io/${{ github.actor }}/static-web:latest

      - name: Push Docker Image
        run: docker push ghcr.io/${{ github.actor }}/static-web:latest


      # ----------------------
      # 4. (Opsional) Trigger deploy ke Railway/Render
      # ----------------------
      - name: Deployment Webhook (Optional)
        if: always()
        run: |
          curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" || true
